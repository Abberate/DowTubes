name: Build installers

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon → arm64 DMG
            script: dist:mac
          - os: windows-latest # → NSIS .exe
            script: dist:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # `npm ci` runs the postinstall (scripts/fetch-engine.mjs), which downloads
      # the platform-specific standalone Python + yt-dlp zipapp + ffmpeg and pip
      # installs mutagen — so each runner bundles ITS OWN platform binaries.
      - run: npm ci

      - run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: dowtubes-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: ignore
