name: Build installers

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

# Needed so the built-in GITHUB_TOKEN can attach installers to the Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon → arm64 DMG
            script: dist:mac
          - os: windows-latest # → NSIS .exe
            script: dist:win
    runs-on: ${{ matrix.os }}
    env:
      # Authenticated GitHub API for scripts/fetch-engine.mjs (avoids the 60 req/h
      # unauthenticated rate limit → HTTP 403 when fetching standalone Python).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # `npm ci` runs the postinstall (scripts/fetch-engine.mjs), which downloads
      # the platform-specific standalone Python + yt-dlp zipapp + ffmpeg and pip
      # installs mutagen — so each runner bundles ITS OWN platform binaries.
      - run: npm ci

      - run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: dowtubes-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: ignore

      # Attach the Windows installer to the GitHub Release for this tag. (The macOS
      # DMG is published from a locally-verified ad-hoc-signed build.)
      - name: Attach Windows installer to the release
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          fail_on_unmatched_files: false
