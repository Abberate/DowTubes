# Packaging config — used in Phase 6 (macOS DMG + Windows NSIS via CI).
# Present now as a placeholder so binary-bundling intent is documented from Phase 0.
appId: com.dowtubes.app
productName: DowTubes
directories:
  buildResources: build
files:
  - out/**
  - package.json
# ffmpeg/ffprobe must exist as real files on disk (asar can't exec) -> unpack them.
asarUnpack:
  - "**/node_modules/ffmpeg-static/**"
  - "**/node_modules/ffprobe-static/**"
# Ship the yt-dlp zipapp + standalone Python as real files next to the app.
# The zipapp is seeded then copied to userData/bin on first run and self-updates
# THERE, never inside the signed bundle.
extraResources:
  - from: resources/engine
    to: engine
    filter: ["**/*"]
  - from: resources/python
    to: python
    filter: ["**/*"]
mac:
  target: dmg
  category: public.app-category.utilities
  # Unsigned for now (internal sharing). Phase 6 adds Developer ID + notarization.
win:
  target: nsis
