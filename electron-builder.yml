appId: com.dowtubes.app
productName: DowTubes
directories:
  buildResources: build
  output: dist
# Ad-hoc sign the macOS app (unsigned apps are killed on Apple Silicon).
afterPack: ./scripts/afterpack.cjs
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!scripts/*"
  - "!build/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!{.gitignore,dev.log,electron-builder.yml}"
  - "!*.md"
# ffmpeg/ffprobe must exist as real files on disk (asar can't exec) -> unpack them.
asarUnpack:
  - "**/node_modules/ffmpeg-static/**"
  - "**/node_modules/ffprobe-static/**"
# Ship the yt-dlp zipapp + standalone Python + icon as real files next to the app.
# The zipapp is seeded then copied to userData/bin on first run and self-updates
# THERE, never inside the (eventually signed) bundle.
extraResources:
  - from: resources/engine
    to: engine
    filter: ["**/*"]
  - from: resources/python
    to: python
    # Exclude prebuilt .pyc: they go stale when copied (mtime changes) and Python
    # would rewrite them into the signed bundle. Bytecode is cached to userData at
    # runtime (PYTHONPYCACHEPREFIX) instead.
    filter: ["**/*", "!**/__pycache__/**"]
  - from: resources/icon.png
    to: icon.png
mac:
  target:
    - target: dmg
      arch: arm64
  category: public.app-category.utilities
  icon: build/icon.icns
  # Unsigned for internal sharing (right-click → Open on other Macs). Phase 6b adds
  # Developer ID + notarization.
  identity: null
win:
  target: nsis
  icon: build/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
